<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            /* Paleta de Marca Nikolukas aplicada a Riesgos */
            --niko-bajo: #fdf2f2;    /* Rosa muy tenue */
            --niko-medio: #f1abab;   /* Rojo suave */
            --niko-alto: #a52a2a;    /* Rojo arcilla / Marrón */
            --niko-extremo: #630505; /* Vinotinto Nikolukas */
            --borde: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background-color: #fff;
        }

        .logo { width: 150px; margin-bottom: 20px; }

        .container {
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }

        /* Estilos de la Tabla */
        .matriz { border-collapse: collapse; text-align: center; }
        .matriz td, .matriz th {
            border: 1px solid var(--borde);
            width: 65px;
            height: 65px;
            padding: 0;
            font-size: 13px;
        }

        .header-cell {
            font-weight: bold;
            font-size: 10px;
            background-color: #f8f8f8;
            text-transform: uppercase;
        }

        /* Aplicación de Matices Vinotinto */
        .c-bajo { background-color: var(--niko-bajo); color: #333; }
        .c-medio { background-color: var(--niko-medio); color: #333; }
        .c-alto { background-color: var(--niko-alto); color: white; }
        .c-extremo { background-color: var(--niko-extremo); color: white; }

        .riesgo-label { font-weight: bold; font-size: 16px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        /* Leyenda Vertical */
        .leyenda { border-collapse: collapse; }
        .leyenda td {
            border: 1px solid var(--borde);
            width: 70px;
            height: 45px;
            text-align: center;
        }
        .leyenda-text {
            border: none !important;
            text-align: left !important;
            padding-right: 15px;
            font-weight: bold;
            font-size: 12px;
            color: var(--niko-extremo);
        }
    </style>
</head>
<body>

    <!-- Logo para reforzar marca -->
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzlQ3gl_WPyT55sF4vTRtGhoTxM3AwDv5sxQ&s" alt="Logo Nikolukas" class="logo">

    <div class="container">
        <!-- Matriz de Riesgo -->
        <table class="matriz">
            <thead>
                <tr>
                    <td class="header-cell">PROBABILIDAD <br> /IMPACTO</td>
                    <td class="header-cell">1</td>
                    <td class="header-cell">2</td>
                    <td class="header-cell">3</td>
                    <td class="header-cell">4</td>
                    <td class="header-cell">5</td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="header-cell">1</td>
                    <td class="c-bajo"></td><td class="c-bajo"></td><td class="c-bajo"></td><td class="c-bajo"></td><td class="c-bajo"></td>
                </tr>
                <tr>
                    <td class="header-cell">2</td>
                    <td class="c-bajo"></td><td class="c-bajo"></td><td class="c-medio"></td><td class="c-medio"></td><td class="c-medio"><span class="riesgo-label">R4</span></td>
                </tr>
                <tr>
                    <td class="header-cell">3</td>
                    <td class="c-bajo"></td><td class="c-medio"></td><td class="c-medio"><span class="riesgo-label">R1</span></td><td class="c-alto"></td><td class="c-alto"><span class="riesgo-label">R3</span></td>
                </tr>
                <tr>
                    <td class="header-cell">4</td>
                    <td class="c-bajo"></td><td class="c-medio"></td><td class="c-alto"><span class="riesgo-label">R2</span></td><td class="c-alto"></td><td class="c-alto"></td>
                </tr>
                <tr>
                    <td class="header-cell">5</td>
                    <td class="c-bajo"></td><td class="c-medio"></td><td class="c-extremo"></td><td class="c-alto"></td><td class="c-alto"></td>
                </tr>
            </tbody>
        </table>

        <!-- Leyenda -->
        <table class="leyenda">
            <tr><td class="leyenda-text">BAJO</td><td class="c-bajo"></td></tr>
            <tr><td class="leyenda-text">MEDIO</td><td class="c-medio"></td></tr>
            <tr><td class="leyenda-text">ALTO</td><td class="c-alto"></td></tr>
            <tr><td class="leyenda-text">EXTREMO</td><td class="c-extremo"></td></tr>
        </table>
    </div>

</body>
</html>
